<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Acme Salon — Demo customer site</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;color:#1A1F3D;background:#fff}
.hero{padding:80px 24px;text-align:center;background:linear-gradient(180deg,#fff 0%,#FAFAFC 100%)}
.hero h1{font-size:52px;margin:0 0 16px;letter-spacing:-.025em;font-weight:600}
.hero p{font-size:18px;color:#5F5E5A;max-width:600px;margin:0 auto;line-height:1.6}
.section{max-width:1100px;margin:0 auto;padding:48px 24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.card{padding:28px;background:#F4F4F8;border-radius:14px}
.card h3{margin:0 0 8px;font-size:18px}
.card p{margin:0;color:#5F5E5A;font-size:14px;line-height:1.6}
.note{max-width:600px;margin:32px auto;padding:18px;background:#EEEDFE;border-radius:12px;color:#3C3489;font-size:14px;text-align:center}
</style>
</head>
<body>

<div class="hero">
  <h1>Welcome to Acme Salon</h1>
  <p>Hair, color, and care in the heart of the city. We open at 9am.</p>
</div>

<div class="note">
  ↓ Click the chat bubble in the bottom-right to test ReachAI ↓
</div>

<div class="section">
  <div class="grid">
    <div class="card"><h3>Haircut</h3><p>45 min · $65</p></div>
    <div class="card"><h3>Color & highlights</h3><p>2h 30min · $180</p></div>
    <div class="card"><h3>Beard trim</h3><p>30 min · $35</p></div>
  </div>
</div>

<script src="http://localhost:8000/v1/widget/acme-salon.js" async></script>
</body>
</html>
